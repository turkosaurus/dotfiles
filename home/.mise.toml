# mise configuration for cross-platform development tools
# https://mise.jdx.dev/configuration.html

[tools]
# language runtimes
go = "1.24.7"
node = "22"
python = "3.13"
"asdf:richin13/asdf-neovim" = "0.12.0"

# dev tools
golangci-lint = "2.4.0"
terraform = "1.13.2"
terragrunt = "0.93.13"

# cli tools
fzf = "latest"
jq = "1.8"
yq = "4"
"aqua:neilotoole/sq" = "latest"
ripgrep = "15"
fd = "10"

# formatters & linters
shfmt = "3"
shellcheck = "0.11"
stylua = "2"

[env]
_.path = ["{{ config_root }}/home/bin", "{{ env.HOME }}/go/bin"]
GOPATH = "{{ env.HOME }}/go"

[settings]
auto_install = true
experimental = false
trusted_config_paths = ["~/p", "~/w"]

[settings.python]
precompiled_flavor = "install_only_stripped"
